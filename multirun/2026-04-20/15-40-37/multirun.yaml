hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - dataset=impressions
    - eval.evaluation_interval=100
    - eval.oracle_aggregation=max
    - loss.lambda_collapse=0.1
    - loss.lambda_contrastive=1
    - loss.lambda_laplacian=0.1
    - loss.lambda_mixup=1
    - model=clip_base
    - model.dropout=0.5
    - model.num_layers=6
    - optimizer.lr=1e-4
    - optimizer.lr_label=1.0e-2
    - train.epochs=1000
    - train.imgtxt_factor=1
    - train.initialization_strategy=imgtxt
    - train.normalize=False
  job:
    name: main_cosir
    chdir: null
    override_dirname: dataset=impressions,eval.evaluation_interval=100,eval.oracle_aggregation=max,loss.lambda_collapse=0.1,loss.lambda_contrastive=1,loss.lambda_laplacian=0.1,loss.lambda_mixup=1,model.dropout=0.5,model.num_layers=6,model=clip_base,optimizer.lr=1e-4,optimizer.lr_label=1.0e-2,train.epochs=1000,train.imgtxt_factor=1,train.initialization_strategy=imgtxt,train.normalize=False
    id: ???
    num: ???
    config_name: config.yaml
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /project/CoSiR
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /project/CoSiR/configs
      schema: file
      provider: main
    - path: hydra_plugins.hydra_colorlog.conf
      schema: pkg
      provider: hydra-colorlog
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      infra: default
      train: default
      model: clip_base
      dataset: impressions
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
data:
  dataset_type: impressions
  train_annotation_path: /project/Impressions/metadata/impressions_train.json
  test_annotation_path: /project/Impressions/metadata/impressions_test.json
  train_image_path: /project/Impressions/media
  test_image_path: /project/Impressions/media
featuremanager:
  storage_dir: /data/SSD2/pre_extract/impressions/features
  extraction_batch_size: 2048
  shard_size: 100000
  store_img_full: false
  store_txt_full: false
  hdf5_compression: true
  hdf5_compression_level: 4
  shuffle_window_shards: 4
experiment:
  name: CoSiR_Experiment
  tags:
  - CoSiR
  - Impressions
  - local
  description: Comprehensive experiment for CoSiR
  results_dir: res/CoSiR_Experiment/impressions
model:
  embedding_dim: 2
  clip_model: openai/clip-vit-base-patch32
  freeze_backbone: true
  num_layers: 6
  hidden_dim: 1024
  dropout: 0.5
train:
  epochs: 1000
  epochs_2: 20
  num_workers: 0
  batch_size: 1024
  initialization_strategy: imgtxt
  imgtxt_factor: 1
  use_template_embeddings: true
  save_as_template_embeddings: true
  load_existing_features: true
  representative_number: 12
  normalize: false
  warm_up_epochs: 200
  warm_up_patience: 20
  warm_up_min_delta_pct: 0.01
loss:
  margin: 0.3
  lambda_contrastive: 1
  lambda_laplacian: 0.1
  lambda_collapse: 0.1
  lambda_boundary: 0.0
  lambda_mixup: 1
  mixup_alpha: 1.0
  return_dict: true
optimizer:
  type: AdamW
  lr: 0.0001
  lr_label: 0.01
  weight_decay: 0.05
scheduler:
  type: CosineAnnealingLR
  T_max: 0
  T_0: 10
  T_mult: 2
  eta_min: 1.0e-09
eval:
  k_vals:
  - 1
  - 5
  - 10
  train_max_batches: 25
  print_metrics: true
  evaluation_interval: 100
  perform_evaluation: true
  oracle_aggregation: max
embeddingmanager:
  storage_mode: memory
  initialization_strategy: zeros
  cache_l1_size_mb: 512
  cache_l2_size_mb: 1024
  enable_l3_cache: true
  auto_sync: true
  sync_batch_size: 0
  embedding_chunk_size: null
  enable_performance_monitoring: true
  log_cache_stats_every_n_epochs: 5
  force_sync_at_epoch_end: true
seed: 42
device: cuda
wandb:
  enabled: true
  project: cosir_new_structure
  entity: augustoxq
  name: ''
  tags:
  - Local
  notes: CoSiR Training
  mode: online
