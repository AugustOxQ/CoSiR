# @package _global_
# Training Configuration

train:
  epochs: 30
  epochs_2: 20 # Label prediction loss epochs
  num_workers: 0
  batch_size: 1024 # This is the batchsize of the evaluation set
  initialization_strategy: imgtxt #TODO: change to imgtxt, debugging time use zeros
  imgtxt_factor: 10.0 #TODO: change to 1.0, debugging time use 10.0 #IMPORTANT: when changing this, we need to re-extract the label embeddings, so also need to change the template embeddings
  use_template_embeddings: True
  save_as_template_embeddings: True
  load_existing_features: True
  representative_number: 12 # This should equal to selected number of conditions * number of grids

# Loss function configuration
loss:
  margin: 0.3
  lambda_1: 1.0 # Main contrastive loss
  lambda_2: 0.1 # Laplacian loss
  lambda_3: 0.01 # Minor loss
  lambda_4: 0.0 # Regularizer loss #TODO: change to 0.1, debugging time use 0.0
  warm_up_epochs: 0 # Warm up epochs for label prediction loss
  middle_epochs: 0 # Middle epochs for label prediction loss
  return_dict: true

# Optimizer configuration
optimizer:
  type: "AdamW"
  lr: 1.0e-5
  lr_2: 1.0e-5
  weight_decay: 5.0e-2
  label_lr_multiplier: 5.0e4 # Label embedding learning rate multiplier

# Scheduler configuration
scheduler:
  type: "CosineAnnealingLR"
  T_max: 0 # Should match train.epochs
  eta_min: 1.0e-9

# Evaluation configuration
eval:
  k_vals: [1, 5, 10]
  train_max_batches: 25 # This is during validation, how many batches we check
  print_metrics: true
  evaluation_interval: 10
  perform_evaluation: true
  oracle_aggregation: "max"  # "max" = oracle upper bound, "mean" = average across conditions
