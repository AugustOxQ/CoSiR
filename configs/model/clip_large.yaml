# @package _global_
# CLIP Large Model Configuration
# ViT-L/14: 256 patch tokens @ 768-dim

model:
  embedding_dim: 2
  clip_model: "openai/clip-vit-large-patch14"
  freeze_backbone: true
  num_layers: 4
  hidden_dim: 1024
  min_radius: 5
  dropout: 0.1

featuremanager:
  extraction_batch_size: 512
