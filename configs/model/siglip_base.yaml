# @package _global_
# SigLIP Base Model Configuration
# Backbone: google/siglip-base-patch16-224 (sigmoid loss, ~86M params)
# ViT-B/16: 196 patch tokens @ 768-dim — 4× more tokens than CLIP-B/32
# Feature dim is auto-detected from the model at runtime.

model:
  embedding_dim: 2
  clip_model: "google/siglip-base-patch16-224"
  freeze_backbone: true
  num_layers: 4
  hidden_dim: 1024
  dropout: 0.1

featuremanager:
  extraction_batch_size: 256
