# @package _global_
# Feature manager configuration
featuremanager:
  # Shard size: number of samples per shard file.
  # 100 000 is a good default — large enough for efficient I/O, small enough
  # that a few shards fit in RAM as a shuffle window for stream mode.
  shard_size: 100000

  # Extraction batch size (separate from training batch size)
  extraction_batch_size: 2048

  # Whether to store full-sequence features (large; only needed for transformers)
  store_img_full: false
  store_txt_full: false

  # HDF5 compression for full-sequence features (img_full / txt_full)
  hdf5_compression: true
  hdf5_compression_level: 4

  # Stream-mode: number of shards loaded into RAM at once as a shuffle window.
  # Larger = better randomness, more RAM.  4 shards × 100 K × ~2 KB ≈ 800 MB.
  shuffle_window_shards: 4

# Embedding manager configuration
embeddingmanager:
  storage_mode: "disk"
  initialization_strategy: "zeros"
  cache_l1_size_mb: 512
  cache_l2_size_mb: 1024
  enable_l3_cache: true
  auto_sync: true
  sync_batch_size: 0
  embedding_chunk_size: null
  enable_performance_monitoring: true
  log_cache_stats_every_n_epochs: 5
  force_sync_at_epoch_end: true
